# Bank Archetype Definitions
# Each top-level key is a bank_type. Scalar values are fixed for all banks of that
# type; [lo, hi] pairs are sampled uniformly within the range per individual bank.
#
# Total bank count: 8 + 10 + 8 + 6 + 4 = 36 (matches data_config.yaml n_banks)

PSB:
  count: 8
  risk_appetite: conservative
  documentation_strictness: high
  digital_only: false

  # Eligibility thresholds
  min_cibil_score: [700, 725]
  max_cibil_score: 900
  min_annual_income: [200000, 350000]
  max_annual_income: 100000000          # effectively unlimited (100 Cr)
  max_foir: [0.55, 0.65]
  max_dti_ratio: [0.70, 0.82]
  min_age: [21, 23]
  max_age_at_maturity: [65, 68]
  max_enquiries_6m: [2, 3]
  max_dpd_30_count: [0, 1]
  max_dpd_90_count: 0
  max_written_off_loans: 0
  max_settled_loans: [0, 1]
  min_employer_tenure_months: [12, 24]
  min_work_experience_years: [2.0, 3.0]

  # Accepted income and employer types
  accepted_income_types: [salaried, business]
  accepted_employer_categories: [PSU, private_listed, private_unlisted, MNC, govt]
  premium_employer_categories: [PSU, govt]   # get approval score bonus

  # Loan products
  loan_types_offered: [personal, home, car, education, business, gold, lap]

  # Loan amount range (INR)
  min_loan_amount: 50000
  max_loan_amount: [2000000, 10000000]      # 20L to 1Cr
  min_tenure_months: 12
  max_tenure_months: 300                    # 25 years

  # Interest rates (APR %)
  interest_rate_min: [8.0, 9.5]
  interest_rate_max: [12.0, 14.0]
  processing_fee_pct: [0.5, 1.0]

  # Geographic coverage
  states_coverage_fraction: [0.80, 1.0]    # fraction of all states covered
  city_tiers_served: [1, 2, 3]

  # Simulation parameters
  approval_base_rate: [0.28, 0.42]
  disbursal_success_rate: [0.82, 0.92]
  disbursal_speed_days: [10, 25]

  # Approval model weights (per bank, sampled within range)
  cibil_weight: [1.2, 2.0]
  dti_weight: [0.8, 1.2]
  amount_fit_weight: [0.3, 0.7]

  # Sweet spot: preferred CIBIL band (offsets above min_cibil_score)
  preferred_cibil_offset: [30, 60]          # preferred_cibil_min = min_cibil + offset
  preferred_cibil_width: [50, 80]           # preferred_cibil_max = min + offset + width

  # Preferred loan size (INR)
  preferred_loan_size_min: [200000, 500000]
  preferred_loan_size_max: [1000000, 5000000]


